name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]
    if: github.actor != 'github-actions[bot]'

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run issue triage
        uses: actions/github-script@v7
        with:
          script: |
            // Create required labels if they don't exist
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '006b75', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'f9d0c4', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ff9f1c', description: 'High priority issue' },
              { name: 'priority-medium', color: 'ffcc00', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '1d76db', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '0052cc', description: 'Issue created by first-time contributor' }
            ];
            
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw err;
                }
              }
            }
            
            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            });
            
            // Add category labels based on title
            const title = context.payload.issue.title.toLowerCase();
            const categoryLabels = [];
            
            if (title.includes('bug')) categoryLabels.push('bug');
            if (title.includes('epic')) categoryLabels.push('epic');
            if (title.includes('maintenance')) categoryLabels.push('maintenance');
            
            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: categoryLabels
              });
            }
            
            // Add priority label based on title/body
            const body = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : '';
            const content = `${title} ${body}`;
            let priorityLabel = 'priority-medium';
            
            if (content.includes('critical') || content.includes('urgent') || content.includes('production') || content.includes('outage')) {
              priorityLabel = 'priority-critical';
            } else if (content.includes('important') || content.includes('high') || content.includes('blocking')) {
              priorityLabel = 'priority-high';
            } else if (content.includes('low') || content.includes('nice-to-have') || content.includes('minor')) {
              priorityLabel = 'priority-low';
            }
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    needs: issue-triage
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const parentTitle = context.payload.issue.title;
            const parentNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const tasks = [
              { number: 1, name: 'Requirements Analysis' },
              { number: 2, name: 'Design and Architecture' },
              { number: 3, name: 'Implementation' },
              { number: 4, name: 'Testing and Documentation' }
            ];
            
            const subIssues = [];
            
            // Create each subtask
            for (const task of tasks) {
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${task.number}: ${task.name}`;
              const subBody = `Related to #${parentNumber}`;
              
              const subIssue = await github.rest.issues.create({
                owner: owner,
                repo: repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subIssues.push(subIssue.data);
            }
            
            // Update parent issue with checklist
            const parentBody = context.payload.issue.body || '';
            const checklist = `\n\n## Epic Tasks\n` + subIssues.map(sub => `- [ ] #${sub.number} ${sub.title}`).join('\n');
            
            await github.rest.issues.update({
              owner: owner,
              repo: repo,
              issue_number: parentNumber,
              body: parentBody + checklist
            });

  auto-response:
    needs: issue-triage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run auto-response
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const author = issue.user.login;
            
            // Check if this is the author's first issue in the repo
            const issues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              author: author,
              state: 'all'
            });
            
            const isFirstIssue = issues.data.length === 1;
            
            // Add first-time-contributor label if needed
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }
            
            // Determine response based on category labels
            const labels = issue.labels.map(l => l.name.toLowerCase());
            let response = '';
            
            if (labels.includes('bug')) {
              response += `### Bug Report Guidelines\nPlease ensure you've provided:\n1. Clear steps to reproduce the issue\n2. Expected vs actual behavior\n3. Screenshots (if applicable)\n4. Environment details (Node.js version, OS, etc.)\n\n`;
            } else if (labels.includes('epic')) {
              response += `### Feature Request Process\nThis epic will be broken down into subtasks. Please review the subtasks and provide feedback as needed.\nThe feature implementation will follow these stages: Requirements Analysis → Design → Implementation → Testing.\n\n`;
            } else if (labels.includes('maintenance')) {
              response += `### Maintenance Guidelines\nPlease ensure the maintenance tasks include:\n1. Clear description of what needs to be cleaned up/refactored\n2. Impact analysis (if any)\n3. Testing plan for the changes\n\n`;
            }
            
            // Add welcome message for first-time contributors
            if (isFirstIssue) {
              response += `Welcome to the repository! This is your first issue here, thanks for contributing!\n`;
            }
            
            // Post the comment
            if (response) {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: response
              });
            }
            
            // Set milestone for high/critical priority issues
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists
              let milestone;
              try {
                // List milestones to find by title
                const milestones = await github.rest.issues.listMilestones({
                  owner: owner,
                  repo: repo,
                  state: 'open'
                });
                milestone = milestones.data.find(m => m.title === 'v1.0.0');
                
                if (!milestone) {
                  // Create milestone if not found
                  milestone = await github.rest.issues.createMilestone({
                    owner: owner,
                    repo: repo,
                    title: 'v1.0.0',
                    state: 'open'
                  });
                  milestone = milestone.data;
                }
              } catch (err) {
                console.error('Error handling milestone:', err);
                throw err;
              }
              
              // Set the milestone
              await github.rest.issues.update({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                milestone: milestone.number
              });
            }
            
            // Update status: remove needs-triage, add needs-review
            try {
              await github.rest.issues.removeLabel({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                name: 'needs-triage'
              });
            } catch (err) {
              if (err.status !== 404) throw err;
            }
            
            await github.rest.issues.addLabels({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });